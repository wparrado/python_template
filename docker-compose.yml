services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  # Start with:  docker compose --profile postgres up
  # Or combined: docker compose --profile postgres --profile rabbitmq up
  db:
    image: postgres:16-alpine
    profiles: [postgres, rabbitmq, kafka]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Alembic migrations ────────────────────────────────────────────────────
  # Runs once after the DB is healthy, then exits.
  migrate:
    build: .
    profiles: [postgres, rabbitmq, kafka]
    command: >
      sh -c "uv run alembic upgrade head"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Application ───────────────────────────────────────────────────────────
  # Default (no profile) — in-memory mode, no DB or broker required:
  #   docker compose up app
  #
  # With PostgreSQL only:
  #   docker compose --profile postgres up
  #
  # With PostgreSQL + RabbitMQ:
  #   docker compose --profile rabbitmq up
  #
  # With PostgreSQL + Kafka:
  #   docker compose --profile kafka up
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: app
      DEBUG: "false"
      LOG_LEVEL: INFO
      # ── Authentication ──────────────────────────────────────────────
      OIDC_ISSUER: ""
      OIDC_AUDIENCE: ""
      # ── OpenTelemetry ───────────────────────────────────────────────
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # ── Persistence ─────────────────────────────────────────────────
      # Switch to 'memory' (and remove depends_on + migrate) for no-DB mode.
      DB_BACKEND: memory
      DATABASE_URL: ""
      # ── Event broker ────────────────────────────────────────────────
      # 'memory'   → in-process only (default, no broker needed)
      # 'rabbitmq' → requires --profile rabbitmq
      # 'kafka'    → requires --profile kafka
      EVENT_BROKER: memory
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      RABBITMQ_EXCHANGE: domain.events
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PREFIX: app

  # ── Application with PostgreSQL profile ──────────────────────────────────
  app-postgres:
    build: .
    profiles: [postgres]
    ports:
      - "8000:8000"
    environment:
      APP_NAME: app
      DEBUG: "false"
      LOG_LEVEL: INFO
      OIDC_ISSUER: ""
      OIDC_AUDIENCE: ""
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: app
      DB_BACKEND: sqlalchemy
      DATABASE_URL: postgresql+asyncpg://app:app@db/app
      EVENT_BROKER: memory
    depends_on:
      migrate:
        condition: service_completed_successfully

  # ── Application with RabbitMQ profile ────────────────────────────────────
  app-rabbitmq:
    build: .
    profiles: [rabbitmq]
    ports:
      - "8001:8000"
    environment:
      APP_NAME: app
      DEBUG: "false"
      LOG_LEVEL: INFO
      OIDC_ISSUER: ""
      OIDC_AUDIENCE: ""
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: app
      DB_BACKEND: sqlalchemy
      DATABASE_URL: postgresql+asyncpg://app:app@db/app
      EVENT_BROKER: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      RABBITMQ_EXCHANGE: domain.events
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  # ── Application with Kafka profile ───────────────────────────────────────
  app-kafka:
    build: .
    profiles: [kafka]
    ports:
      - "8002:8000"
    environment:
      APP_NAME: app
      DEBUG: "false"
      LOG_LEVEL: INFO
      OIDC_ISSUER: ""
      OIDC_AUDIENCE: ""
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: app
      DB_BACKEND: sqlalchemy
      DATABASE_URL: postgresql+asyncpg://app:app@db/app
      EVENT_BROKER: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PREFIX: app
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  # Requires --profile rabbitmq
  # Management UI: http://localhost:15672  (guest / guest)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    profiles: [rabbitmq]
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ── Kafka ─────────────────────────────────────────────────────────────────
  # Requires --profile kafka
  # Uses KRaft mode (no Zookeeper) — Kafka 3.7+
  kafka:
    image: apache/kafka:3.7.0
    profiles: [kafka]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ── Optional: OpenTelemetry Collector ─────────────────────────────────────
  # Uncomment to enable telemetry. Configure otel-config.yaml to route to
  # Jaeger, Grafana Tempo, Datadog, etc.
  #
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   command: ["--config=/etc/otel/config.yaml"]
  #   volumes:
  #     - ./otel-config.yaml:/etc/otel/config.yaml:ro
  #   ports:
  #     - "4317:4317"   # OTLP gRPC
  #     - "4318:4318"   # OTLP HTTP
  #     - "8888:8888"   # Collector metrics

volumes:
  postgres_data:
  rabbitmq_data:
  kafka_data:
