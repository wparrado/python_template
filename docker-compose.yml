services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: app
      DEBUG: "false"
      LOG_LEVEL: INFO
      # Authentication — set to your OIDC provider
      OIDC_ISSUER: ""
      OIDC_AUDIENCE: ""
      # OpenTelemetry — set to your OTLP backend
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on: []
    # Uncomment when otel-collector is enabled:
    # depends_on:
    #   - otel-collector

  # ── Optional: OpenTelemetry Collector ─────────────────────────────────────
  # Uncomment to enable telemetry. The collector can fan out to multiple backends.
  # Configure otel-config.yaml to route to Jaeger, Grafana Tempo, Datadog, etc.
  #
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   command: ["--config=/etc/otel/config.yaml"]
  #   volumes:
  #     - ./otel-config.yaml:/etc/otel/config.yaml:ro
  #   ports:
  #     - "4317:4317"   # OTLP gRPC
  #     - "4318:4318"   # OTLP HTTP
  #     - "8888:8888"   # Collector metrics
