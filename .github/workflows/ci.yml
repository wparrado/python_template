name: CI — Quality Gate

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

# Cancel in-progress runs for the same PR/branch to avoid wasted compute
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 0. Build CI Docker image (shared across all jobs via GHA cache) ────────
  build-ci-image:
    name: Build CI image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          load: true
          tags: python-template-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as artifact
        run: docker save python-template-ci:latest | gzip > /tmp/ci-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ci-image
          path: /tmp/ci-image.tar.gz
          retention-days: 1

  # ── 1. Ruff: format check + lint ──────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-ci-image

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp

      - name: Load CI image
        run: docker load < /tmp/ci-image.tar.gz

      - name: Check formatting
        run: docker run --rm python-template-ci:latest uv run ruff format --check src/ tests/

      - name: Lint
        run: docker run --rm python-template-ci:latest uv run ruff check src/ tests/

  # ── 2. Mypy: strict type checking ─────────────────────────────────────────
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp

      - name: Load CI image
        run: docker load < /tmp/ci-image.tar.gz

      - name: Run mypy (strict)
        run: |
          docker run --rm python-template-ci:latest bash -c \
            'MYPYPATH=src uv run mypy --explicit-package-bases $(find src/app -name "*.py" | tr "\n" " ")'

  # ── 3. Pylint: score must be 10/10 ────────────────────────────────────────
  quality:
    name: Quality (pylint 10/10)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: type-check

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp

      - name: Load CI image
        run: docker load < /tmp/ci-image.tar.gz

      - name: Run pylint
        run: docker run --rm python-template-ci:latest uv run pylint src/app --fail-under=10

  # ── 4. Architecture: tach + import-linter + pytest-archon ─────────────────
  architecture:
    name: Architecture (tach + import-linter + archon)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp

      - name: Load CI image
        run: docker load < /tmp/ci-image.tar.gz

      - name: Check module boundaries (tach)
        run: docker run --rm python-template-ci:latest uv run tach check

      - name: Check import rules (import-linter)
        run: docker run --rm python-template-ci:latest uv run lint-imports

      - name: Run architecture tests (pytest-archon)
        run: docker run --rm python-template-ci:latest uv run pytest tests/architecture/ -x -q

  # ── 5. Tests: unit + integration, matrix 3.12 & 3.13 ─────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: architecture

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI image for Python ${{ matrix.python-version }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          build-args: PYTHON_VERSION=${{ matrix.python-version }}
          load: true
          tags: python-template-ci:${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          docker run --rm \
            -e APP_NAME=test \
            -e DEBUG=false \
            -e OIDC_ISSUER="" \
            -e OTEL_ENABLED=false \
            python-template-ci:${{ matrix.python-version }} \
            uv run pytest tests/ -x -q --ignore=tests/architecture
