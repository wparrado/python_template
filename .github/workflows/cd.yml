name: CD — Build & Push Docker Image

on:
  # Only run after CI passes on main
  workflow_run:
    workflows: ["CI — Quality Gate"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write  # Required to push to GHCR


jobs:
  docker-build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only proceed if the triggering CI run succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5

      # Enable multi-architecture builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Authenticate against GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags: latest + commit SHA for traceability
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      # Build and push with GitHub Actions layer cache
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
