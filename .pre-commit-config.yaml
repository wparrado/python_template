repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format --check src/ tests/
        types: [python]
        stages: [commit, push]
        pass_filenames: false

      - id: ruff-lint
        name: ruff lint
        language: system
        entry: uv run ruff check src/ tests/
        types: [python]
        stages: [commit, push]
        pass_filenames: false

      - id: mypy
        name: mypy type check
        language: system
        entry: bash -c 'MYPYPATH=src uv run mypy --explicit-package-bases $(find src/app -name "*.py" | tr "\n" " ")'
        types: [python]
        stages: [commit, push]
        pass_filenames: false

      - id: pylint
        name: pylint
        language: system
        entry: uv run pylint src/app
        types: [python]
        stages: [commit, push]
        pass_filenames: false

      - id: tach-check
        name: tach module boundaries (dtach)
        language: system
        entry: uv run tach check
        stages: [commit, push]
        pass_filenames: false

      - id: import-linter
        name: import-linter contracts
        language: system
        entry: uv run lint-imports
        stages: [commit, push]
        pass_filenames: false

      - id: architecture-tests
        name: architectural tests (pytest-archon)
        language: system
        entry: uv run pytest tests/architecture/ -x -q
        stages: [commit, push]
        pass_filenames: false
