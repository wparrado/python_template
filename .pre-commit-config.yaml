repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      # ----------------------------------------------------------------
      # pre-commit: architectural enforcement only
      # ----------------------------------------------------------------
      - id: protect-architecture-tests
        name: protect — architectural tests are read-only
        language: script
        entry: scripts/protect_arch_tests.sh
        stages: [pre-commit]
        pass_filenames: false

      - id: tach-check
        name: tach — module boundary enforcement
        language: system
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run tach check'
        stages: [pre-commit]
        pass_filenames: false

      - id: import-linter
        name: import-linter — layered dependency contracts
        language: system
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run lint-imports'
        stages: [pre-commit]
        pass_filenames: false

      - id: architecture-tests
        name: pytest-archon — architectural rule tests
        language: system
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run pytest tests/architecture/ -x -q'
        stages: [pre-commit]
        pass_filenames: false

      # ----------------------------------------------------------------
      # pre-push: quality gate (pylint 10/10 + mypy 0 errors)
      # ----------------------------------------------------------------
      - id: mypy
        name: mypy — strict type checking
        language: system
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && MYPYPATH=src uv run mypy --explicit-package-bases $(find src/app -name "*.py" | tr "\n" " ")'
        stages: [pre-push]
        pass_filenames: false

      - id: pylint
        name: pylint — code quality (must score 10/10)
        language: system
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && PYTHONPATH=src uv run pylint src/app --fail-under=10'
        stages: [pre-push]
        pass_filenames: false
